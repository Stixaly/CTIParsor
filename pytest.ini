[pytest]
filterwarnings =
    # Third-party: Starlette's TestClient emits this when httpx (not httpx2) is
    # installed.  It's not actionable from our code without changing the pinned
    # dependency, so ignore this one specific message to keep CI logs clean
    # without suppressing warnings from our own code.
    ignore:Using .httpx. with .starlette.testclient. is deprecated
